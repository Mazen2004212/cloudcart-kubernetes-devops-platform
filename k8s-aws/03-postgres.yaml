apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudcart-postgres
  namespace: cloudcart
  labels:
    app: cloudcart-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudcart-postgres
  template:
    metadata:
      labels:
        app: cloudcart-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: cloudcart-config
                  key: DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: cloudcart-secret
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cloudcart-secret
                  key: DB_PASSWORD
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U cloudcart_user -d cloudcart
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U cloudcart_user -d cloudcart
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: postgres-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: cloudcart-postgres
  namespace: cloudcart
  labels:
    app: cloudcart-postgres
spec:
  type: ClusterIP
  selector:
    app: cloudcart-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
